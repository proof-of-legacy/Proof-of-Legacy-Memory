name: Build Windows Miner EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Verify source integrity
      run: |
        python -c "content=open('polm.py','r',encoding='utf-8').read(); assert 'detect_cpu' in content and 'cpu_name' in content, 'Integrity fail'; print('OK')"

    - name: Build EXE
      run: >
        pyinstaller
        --onefile
        --windowed
        --name "PoLM-Miner"
        --hidden-import tkinter
        --hidden-import tkinter.ttk
        --hidden-import tkinter.scrolledtext
        --hidden-import cryptography
        --hidden-import mnemonic
        polm_miner_gui.py

    - name: Generate SHA256
      run: |
        $hash = Get-FileHash dist/PoLM-Miner.exe -Algorithm SHA256
        $hash.Hash | Out-File -FilePath dist/PoLM-Miner.exe.sha256 -NoNewline
        Write-Host "SHA256: $($hash.Hash)"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: PoLM-Miner-Windows
        path: |
          dist/PoLM-Miner.exe
          dist/PoLM-Miner.exe.sha256
        retention-days: 90

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: miner-latest
        name: "PoLM Miner - Windows"
        body: |
          PoLM Miner for Windows — double-click to start mining!

          ANTIVIRUS WARNING: Windows Defender may flag this file as suspicious.
          This is a false positive common with PyInstaller-built executables.
          The source code is fully open source — you can verify it yourself.

          To run: Right-click the .exe, select "More info", then "Run anyway".
          Or add an exclusion in Windows Security settings.

          Verify SHA256: Get-FileHash PoLM-Miner.exe -Algorithm SHA256
          Compare with PoLM-Miner.exe.sha256

          Source: https://github.com/proof-of-legacy/Proof-of-Legacy-Memory
          Built from ${{ github.sha }}
        files: |
          dist/PoLM-Miner.exe
          dist/PoLM-Miner.exe.sha256
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
